apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: guardian-lineage-immutability-webhook
webhooks:
  - name: validate-lineage.security.ontai.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    rules:
      - apiGroups: ["security.ontai.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE"]
        resources:
          - rbacpolicies
          - rbacprofiles
          - identitybindings
          - identityproviders
          - permissionsets
        scope: "*"
    clientConfig:
      service:
        name: guardian-lineage-webhook-service
        namespace: seam-system
        path: /validate-lineage
        port: 443
