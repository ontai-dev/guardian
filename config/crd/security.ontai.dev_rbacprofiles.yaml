---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rbacprofiles.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: RBACProfile
    listKind: RBACProfileList
    plural: rbacprofiles
    shortNames:
    - rbp
    singular: rbacprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.name
      name: Name
      type: string
    - jsonPath: .status.provisioned
      name: Provisioned
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RBACProfile is the per-component per-tenant permission declaration.
          Provisioned=true is set exclusively by the RBACProfileReconciler. CS-INV-005.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: RBACProfileSpec defines the desired state of a RBACProfile.
            properties:
              permissionDeclarations:
                description: PermissionDeclarations is the list of permission declarations. Must not be empty.
                items:
                  description: PermissionDeclaration declares a permission set reference with scope.
                  properties:
                    clusters:
                      description: Clusters restricts this declaration to specific clusters. Empty means all TargetClusters.
                      items:
                        type: string
                      type: array
                    permissionSetRef:
                      description: PermissionSetRef is the name of a PermissionSet CR in the same namespace.
                      type: string
                    scope:
                      description: Scope declares whether these permissions are namespaced or cluster-scoped.
                      enum:
                      - namespaced
                      - cluster
                      type: string
                  required:
                  - permissionSetRef
                  - scope
                  type: object
                type: array
              principalRef:
                description: PrincipalRef is the name of the principal this profile governs.
                type: string
              rbacPolicyRef:
                description: RBACPolicyRef is the name of the governing RBACPolicy in the same namespace.
                type: string
              targetClusters:
                description: TargetClusters is the list of cluster names this profile grants access to.
                items:
                  type: string
                type: array
            required:
            - permissionDeclarations
            - principalRef
            - rbacPolicyRef
            - targetClusters
            type: object
          status:
            description: RBACProfileStatus defines the observed state of a RBACProfile.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              epgVersion:
                type: string
              lastProvisionedAt:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              provisioned:
                type: boolean
              validationSummary:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
