---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: permissionsnapshots.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: PermissionSnapshot
    listKind: PermissionSnapshotList
    plural: permissionsnapshots
    shortNames:
    - psn
    singular: permissionsnapshot
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PermissionSnapshot is a computed, versioned EPG for a specific target cluster.
          Generated exclusively by the EPGReconciler. Never manually authored.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: PermissionSnapshotSpec defines the desired state of a PermissionSnapshot.
            properties:
              generatedAt:
                description: GeneratedAt is the timestamp when this snapshot was generated.
                format: date-time
                type: string
              principalPermissions:
                description: PrincipalPermissions is the per-principal permission map for this cluster.
                items:
                  description: PrincipalPermissionEntry is the per-principal permission entry.
                  properties:
                    allowedOperations:
                      description: AllowedOperations is the list of allowed operations for this principal.
                      items:
                        description: AllowedOperation describes a single permitted operation.
                        properties:
                          apiGroup:
                            description: APIGroup is the Kubernetes API group. Empty means core.
                            type: string
                          clusters:
                            description: Clusters is the list of cluster names this operation applies to.
                            items:
                              type: string
                            type: array
                          resource:
                            description: Resource is the Kubernetes resource type.
                            type: string
                          verbs:
                            description: Verbs is the list of permitted operations.
                            items:
                              type: string
                            type: array
                        required:
                        - resource
                        - verbs
                        type: object
                      type: array
                    principalRef:
                      description: PrincipalRef is the principal name this entry governs.
                      type: string
                  required:
                  - principalRef
                  type: object
                type: array
              targetCluster:
                description: TargetCluster is the cluster name this snapshot governs.
                type: string
              version:
                description: Version is the monotonically increasing version string (ISO8601 timestamp).
                type: string
            required:
            - generatedAt
            - targetCluster
            - version
            type: object
          status:
            description: PermissionSnapshotStatus defines the observed state of a PermissionSnapshot.
            properties:
              drift:
                description: Drift is true when lastAckedVersion != expectedVersion.
                type: boolean
              expectedVersion:
                description: ExpectedVersion is the version the management cluster expects agents to acknowledge.
                type: string
              lastAckedVersion:
                description: LastAckedVersion is the version last acknowledged by the target cluster agent.
                type: string
              lastSeen:
                description: LastSeen is the timestamp of the most recent agent acknowledgement.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
