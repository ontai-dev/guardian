---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: identitybindings.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: IdentityBinding
    listKind: IdentityBindingList
    plural: identitybindings
    shortNames:
    - ib
    singular: identitybinding
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: IdentityBinding maps an external identity to an ONT permission principal.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: IdentityBindingSpec defines the desired state of an IdentityBinding.
            properties:
              certificateConfig:
                description: CertificateConfig holds certificate-specific configuration. Required when identityType=certificate.
                properties:
                  commonName:
                    description: CommonName is the certificate CN field.
                    type: string
                  organization:
                    description: Organization is the certificate O field.
                    type: string
                required:
                - commonName
                type: object
              identityType:
                description: IdentityType declares the class of external identity being bound.
                enum:
                - oidc
                - serviceAccount
                - certificate
                type: string
              oidcConfig:
                description: OIDCConfig holds OIDC-specific configuration. Required when identityType=oidc.
                properties:
                  clientID:
                    description: ClientID is the client identifier registered with the OIDC provider.
                    type: string
                  groupsClaim:
                    description: GroupsClaim is the JWT claim name that contains group membership.
                    type: string
                  issuer:
                    description: Issuer is the OIDC provider URL.
                    type: string
                required:
                - clientID
                - issuer
                type: object
              principalName:
                description: PrincipalName maps to the principal name used in RBACProfiles.
                type: string
              serviceAccountConfig:
                description: ServiceAccountConfig holds ServiceAccount-specific configuration. Required when identityType=serviceAccount.
                properties:
                  name:
                    description: Name is the ServiceAccount name.
                    type: string
                  namespace:
                    description: Namespace is the ServiceAccount namespace.
                    type: string
                required:
                - name
                - namespace
                type: object
              tokenMaxTTLSeconds:
                description: TokenMaxTTLSeconds is the maximum token lifetime in seconds. Required when trustMethod=token. Hard limit 900.
                format: int32
                type: integer
              trustMethod:
                description: TrustMethod declares how identity trust is established. mtls is default.
                enum:
                - mtls
                - token
                type: string
            required:
            - identityType
            - principalName
            - trustMethod
            type: object
          status:
            description: IdentityBindingStatus defines the observed state of an IdentityBinding.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              validationSummary:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
