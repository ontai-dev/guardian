---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: rbacpolicies.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: RBACPolicy
    listKind: RBACPolicyList
    plural: rbacpolicies
    shortNames:
    - rp
    singular: rbacpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enforcementMode
      name: EnforcementMode
      type: string
    - jsonPath: .status.conditions[?(@.type=="RBACPolicyValid")].status
      name: Valid
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RBACPolicy is the governing policy resource for the security.ontai.dev API group.
          It constrains what RBACProfiles within its scope may declare. Profiles that
          exceed their governing policy are rejected at admission. guardian-schema.md §7.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RBACPolicySpec defines the desired state of a RBACPolicy.
              RBACPolicy is the governing policy for RBACProfiles within its scope.
              Profiles that declare permissions exceeding this policy are rejected at admission.
              guardian-schema.md §7.
            properties:
              allowedClusters:
                description: |-
                  AllowedClusters is the list of cluster names this policy permits operations on.
                  Empty means this policy applies to the management cluster only.
                  Each entry must be a non-empty string with no whitespace.
                items:
                  type: string
                type: array
              enforcementMode:
                description: |-
                  EnforcementMode controls how violations are handled by the admission webhook.
                  strict: violations are rejected. audit: violations are logged only.
                enum:
                - strict
                - audit
                type: string
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                  The admission webhook rejects any update that modifies this field after creation.
                  seam-core-schema.md §5, CLAUDE.md §14 Decision 1.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              maximumPermissionSetRef:
                description: |-
                  MaximumPermissionSetRef is the name of a PermissionSet CR that defines the
                  maximum permissions any RBACProfile governed by this policy may declare.
                  Profiles attempting to exceed this bound are rejected at admission.
                  Must be non-empty.
                type: string
              subjectScope:
                description: |-
                  SubjectScope declares the class of principals this policy governs.
                  Must be one of: platform, tenant.
                enum:
                - platform
                - tenant
                type: string
            required:
            - enforcementMode
            - maximumPermissionSetRef
            - subjectScope
            type: object
          status:
            description: RBACPolicyStatus defines the observed state of a RBACPolicy.
            properties:
              conditions:
                description: |-
                  Conditions is the list of status conditions for this RBACPolicy.
                  Standard condition types: RBACPolicyValid, RBACPolicyDegraded.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the generation of the RBACPolicy spec that was most
                  recently reconciled. Used to detect whether the status reflects the current spec.
                format: int64
                type: integer
              profileCount:
                description: |-
                  ProfileCount is the number of RBACProfiles currently governed by this policy.
                  Informational — used by operators and humans to understand policy scope.
                format: int32
                type: integer
              validationSummary:
                description: |-
                  ValidationSummary is a human-readable one-line summary of the current
                  validation state. "Valid." on success. "Validation failed: N check(s) failed."
                  on failure.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
