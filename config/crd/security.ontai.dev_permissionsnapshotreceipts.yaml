---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: permissionsnapshotreceipts.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: PermissionSnapshotReceipt
    listKind: PermissionSnapshotReceiptList
    plural: permissionsnapshotreceipts
    shortNames:
    - psr
    singular: permissionsnapshotreceipt
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PermissionSnapshotReceipt is the target cluster CRD managed by the runner in
          agent mode. It records the current acknowledged PermissionSnapshot and local
          RBAC provisioning status. One per target cluster.
          Exists in ont-system on the target cluster. guardian-schema.md §8.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PermissionSnapshotReceiptSpec defines the desired state of a PermissionSnapshotReceipt.
              Created and maintained exclusively by the runner in agent mode.
              Never authored manually. guardian-schema.md §8.
            properties:
              acknowledgedAt:
                description: AcknowledgedAt is the timestamp when the agent acknowledged
                  this snapshot.
                format: date-time
                type: string
              clusterName:
                description: ClusterName is the name of the target cluster this receipt
                  belongs to.
                type: string
              snapshotVersion:
                description: SnapshotVersion is the version of the PermissionSnapshot
                  this receipt acknowledges.
                type: string
            required:
            - acknowledgedAt
            - clusterName
            - snapshotVersion
            type: object
          status:
            description: PermissionSnapshotReceiptStatus defines the observed state
              of a PermissionSnapshotReceipt.
            properties:
              degradedReason:
                description: |-
                  DegradedReason describes the signature verification failure when
                  DegradedSecurityState=true. Written by conductor agent in tenant mode. INV-026.
                type: string
              degradedSecurityState:
                description: |-
                  DegradedSecurityState is set to true when the snapshot pull loop cannot
                  verify the Ed25519 signature on the PermissionSnapshot. Written by conductor
                  agent in tenant mode. INV-026.
                type: boolean
              localArtifacts:
                description: LocalArtifacts is the list of RBAC artifact names provisioned
                  from this snapshot.
                items:
                  type: string
                type: array
              localProvisioningStatus:
                description: LocalProvisioningStatus is a human-readable description
                  of local RBAC provisioning.
                type: string
              syncStatus:
                description: SyncStatus is the synchronization state with the management
                  cluster.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
