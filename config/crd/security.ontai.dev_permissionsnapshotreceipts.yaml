---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: permissionsnapshotreceipts.security.ontai.dev
spec:
  group: security.ontai.dev
  names:
    kind: PermissionSnapshotReceipt
    listKind: PermissionSnapshotReceiptList
    plural: permissionsnapshotreceipts
    shortNames:
    - psr
    singular: permissionsnapshotreceipt
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PermissionSnapshotReceipt is the target cluster CRD managed by
          the runner in agent mode. Created and maintained exclusively by the runner agent.
          Never authored manually. ont-security-schema.md §8.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: PermissionSnapshotReceiptSpec defines the desired state.
            properties:
              acknowledgedAt:
                description: AcknowledgedAt is when the agent acknowledged this snapshot.
                format: date-time
                type: string
              clusterName:
                description: ClusterName is the name of the target cluster this receipt belongs to.
                type: string
              snapshotVersion:
                description: SnapshotVersion is the version of the PermissionSnapshot this receipt acknowledges.
                type: string
            required:
            - acknowledgedAt
            - clusterName
            - snapshotVersion
            type: object
          status:
            description: PermissionSnapshotReceiptStatus defines the observed state.
            properties:
              localArtifacts:
                description: LocalArtifacts is the list of RBAC artifact names provisioned from this snapshot.
                items:
                  type: string
                type: array
              localProvisioningStatus:
                description: LocalProvisioningStatus is a human-readable description of local RBAC provisioning.
                type: string
              syncStatus:
                description: SyncStatus is the synchronization state with the management cluster.
                enum:
                - InSync
                - OutOfSync
                - DegradedSecurityState
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
