apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: guardian-lineage-immutability-webhook
  annotations:
    # cert-manager injects the CA bundle from the guardian-lineage-webhook-cert Certificate.
    cert-manager.io/inject-ca-from: seam-system/guardian-lineage-webhook-cert
webhooks:
  - name: validate-lineage.security.ontai.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # FailurePolicy: Fail — a missing lineage check is a security breach.
    # CLAUDE.md §14 Decision 1, seam-core-schema.md §5.
    failurePolicy: Fail
    rules:
      - apiGroups: ["security.ontai.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE"]
        resources:
          - rbacpolicies
          - rbacprofiles
          - identitybindings
          - identityproviders
          - permissionsets
        scope: "*"
    clientConfig:
      service:
        name: guardian-lineage-webhook-service
        namespace: seam-system
        path: /validate-lineage
        port: 443
