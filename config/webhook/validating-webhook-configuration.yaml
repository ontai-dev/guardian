apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: guardian-rbac-webhook
  annotations:
    # caBundle is populated at compile time by compiler enable from guardian-ca-secret.
    ontai.dev/managed-by: compiler
webhooks:
  - name: validate-rbac.security.ontai.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # FailurePolicy: Fail — if the webhook is unreachable, admission is blocked.
    # This enforces CS-INV-001: policy without enforcement is decoration.
    failurePolicy: Fail
    # Namespaces labelled seam.ontai.dev/webhook-mode=exempt are excluded —
    # seam-system and kube-system carry this label. All other namespaces are subject
    # to RBAC enforcement. guardian-schema.md §5.
    namespaceSelector:
      matchExpressions:
        - key: seam.ontai.dev/webhook-mode
          operator: NotIn
          values:
            - exempt
    rules:
      - apiGroups: ["rbac.authorization.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]
        scope: "*"
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceaccounts"]
        scope: "*"
    clientConfig:
      service:
        name: guardian
        namespace: seam-system
        path: /validate-rbac
        port: 443
